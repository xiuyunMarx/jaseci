name: K8s Microservice Real E2E

# Real-app e2e (no-Docker): deploys the fixture with `jac start --scale
# --experimental` semantics - a host-built self-contained jac binary +
# precompiled plugin source ship over a PVC (no image build), jac is installed
# at pod startup. Verifies pods + gateway routing, rolling-restart +
# hammer-for-non-2xx.

on:
  workflow_dispatch:
  pull_request:
    # Heavy microk8s e2e (~25 min). Only the jac runtime + the scale deploy
    # pipeline can affect it, so skip PRs that touch neither (docs, byllm, mcp,
    # etc.). This job is NOT a required status check, so a path-skip is safe -
    # it won't leave a PR waiting on a check that never reports.
    paths:
      - 'jac/**'
      - 'jac-scale/**'
      - '.github/workflows/k8s-microservice-real-e2e.yml'

# Cancel superseded PR runs; never cancel a run for a commit on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  real-e2e:
    name: microk8s real-app smoke
    # Escape hatch: add the 'skip-k8s' label to a PR to skip this job too
    # (matches the test-scale-k8s gate in test-jaseci.yml).
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-k8s') }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # No-Docker path: a cold run also builds the shipped `.ship-out` binary
    # (payload precompile) + precompiles the plugin JIRs. Both are cached
    # (below), so warm runs are fast; the higher ceiling covers a cold build.
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Install jac-scale[deploy] (global so the e2e app can import it)
        run: jac install -e jac-scale --extras deploy --global

      - name: Set up microk8s
        run: |
          sudo snap install microk8s --classic --channel=1.30/stable
          sudo microk8s status --wait-ready --timeout 180
          # hostpath-storage provides the default StorageClass. Without it the
          # bundle PVC (nil storageClassName -> needs a default SC) never binds
          # and the bundle-loader pod hangs Pending. Its provisioner also binds
          # the ReadWriteMany bundle PVC on a single node.
          sudo microk8s enable hostpath-storage
          sudo microk8s status --wait-ready --timeout 180
          sudo usermod -aG microk8s "$USER"
          mkdir -p "$HOME/.kube"
          sudo microk8s config | sudo tee "$HOME/.kube/config" >/dev/null
          sudo chown "$USER" "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Pre-pull + enable addons (best-effort)
        # registry.k8s.io has been flaky on GHA. Pre-pulling via
        # containerd directly lets us retry without restarting the
        # kubelet's image-pull state machine.
        continue-on-error: true
        run: |
          for img in registry.k8s.io/metrics-server/metrics-server:v0.7.2 \
                     registry.k8s.io/ingress-nginx/controller:v1.10.1; do
            for _ in 1 2 3; do sudo microk8s ctr images pull "$img" && break; sleep 5; done
          done
          sudo microk8s enable metrics-server || echo "WARN: metrics-server enable failed"
          sudo microk8s enable ingress || echo "WARN: ingress enable failed"
          kubectl wait --namespace ingress --for=condition=ready pod \
              --selector=name=nginx-ingress-microk8s --timeout=180s \
              || echo "WARN: ingress controller not ready; K10 path will skip"

      - name: Set up Zig 0.16.0
        # BinaryInjector shells out to `zig build --prefix .ship-out` to produce
        # the self-contained binary shipped to pods. setup-jac only installs zig
        # on a binary-cache MISS, so add it unconditionally here.
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: false

      - name: Restore binary build deps (LLVM + pbs + bun)
        # Same keys/paths as setup-jac so the `.ship-out` payload build reuses
        # the already-fetched LLVM/CPython/bun trees instead of re-downloading.
        uses: actions/cache@v4
        with:
          path: |
            jac/.llvm-build
            jac/.pbs-build
            jac/.bun-build
          key: shipout-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('jac/launcher/payload.zig') }}

      - name: Cache shipped binary + zig build cache (.ship-out)
        # The host-built binary is keyed on the content that goes into it; a hit
        # makes `zig build --prefix .ship-out` a near-noop. Exact-key only so a
        # source change rebuilds rather than shipping a stale binary.
        uses: actions/cache@v4
        with:
          path: |
            jac/.ship-out
            jac/.zig-cache
          key: shipout-bin-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('jac/jaclang/**', 'jac/launcher/**', 'jac/build.zig') }}

      - name: Cache precompiled plugin JIRs (_precompiled)
        # precompile_plugins() is idempotent (skips JIRs that still validate), so
        # restoring the bundle turns the host precompile into fast key-checks.
        uses: actions/cache@v4
        with:
          path: |
            jac-scale/jac_scale/_precompiled
            jac-byllm/byllm/_precompiled
            jac-mcp/jac_mcp/_precompiled
          key: plugin-jir-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('jac/jaclang/**', 'jac-scale/jac_scale/**', 'jac-byllm/byllm/**', 'jac-mcp/**') }}

      - name: Show cluster info
        run: |
          kubectl version
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -A

      - name: Run K8s microservice real-app e2e
        env:
          CLUSTER_TYPE: microk8s
        run: |
          bash jac-scale/scripts/k8s_microservice_real_e2e.sh \
              jac-scale/jac_scale/tests/fixtures/k8s_e2e

      - name: Dump kubectl state on failure
        if: failure()
        run: |
          echo "=== events ==="
          kubectl get events --sort-by='.lastTimestamp' --all-namespaces || true
          echo "=== pods ==="
          kubectl get pods -A -o wide || true
          echo "=== describe pods (jac-e2e ns) ==="
          kubectl describe pods -n jac-e2e || true
          echo "=== gateway logs ==="
          kubectl logs -n jac-e2e -l app=gateway --tail=100 || true
          echo "=== service-app logs (sample) ==="
          for app in cart-app orders-app products-app; do
              echo "--- $app ---"
              kubectl logs -n jac-e2e -l app=$app --tail=50 || true
          done
          echo "=== ingress status ==="
          kubectl describe ingress -n jac-e2e || true
          echo "=== ingress controller logs ==="
          kubectl logs -n ingress -l name=nginx-ingress-microk8s --tail=50 || true
