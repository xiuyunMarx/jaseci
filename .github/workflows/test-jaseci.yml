name: Run tests for jaseci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

# Cancel superseded PR runs; never cancel a run for a commit on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# These jobs build and validate the SHIPPED jac binary (bundled + precompiled
# jaclang). The checkout's jac.toml files (root and jac/) carry a `[dev]
# jaclang_source` stanza for the local editable dev loop; on a freshly built
# binary `_jac_finder` would pick it up at startup and reroute `import jaclang`
# to the source tree, setting JAC_NO_PRECOMPILE=1 (skipping the shipped JIR
# bundle). That regresses the artifact under test: cold start recompiles the
# whole compiler (the `timeout 5 jac --version` smoke then times out), the
# precompile step emits a degraded bundle, and the plugin suites run against the
# source tree rather than the binary as shipped. Force the dev loop OFF so CI
# exercises the real artifact. (Mirrors the guard in test-binary.yml.)
env:
  JAC_NO_DEV_SOURCE: "1"

jobs:
  # NOTE: jaclang's own test suite (formerly test-core-compiler / test-core-runtime,
  # `pip install -e jac` + pytest) now runs through the single `jac` binary in
  # test-binary.yml ("jac single-binary self-test" -> Full repo suite), which gates
  # the same changes on PRs to main. Removed here as part of the clean break off the
  # editable install (#6852). The jobs below cover plugins / client / docs / pypi.

  # Cheap path filter on a free GitHub-hosted runner. Used ONLY to skip the
  # NON-required jobs on PRs that can't affect them. The required client/plugin
  # jobs (e.g. test-client) are never gated, so the merge gate is unchanged. These
  # outputs are only consulted for pull_request events - each gated job's `if`
  # forces a run on push/dispatch, so main always keeps full coverage regardless of
  # the filter result. `core` (jac/**) is jaclang itself, so it is folded into every
  # downstream gate.
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      scale: ${{ steps.filter.outputs.scale }}
      byllm: ${{ steps.filter.outputs.byllm }}
      mcp: ${{ steps.filter.outputs.mcp }}
      docs: ${{ steps.filter.outputs.docs }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Editing this workflow re-runs the full gated suite so CI changes
            # are validated end-to-end (folded into `core`, the broadest gate).
            core:
              - 'jac/**'
              - '.github/workflows/test-jaseci.yml'
            scale:
              - 'jac-scale/**'
            byllm:
              - 'jac-byllm/**'
            mcp:
              - 'jac-mcp/**'
            docs:
              - 'docs/**'
            desktop:
              - 'jac/jaclang/runtimelib/client/targets/desktop/**'

  test-solid-jsdom:
    # Runtime exec of the Solid framework backend: compile a Solid component +
    # the @jac/runtime shim to JS and mount it in jsdom under node, asserting
    # render + reactivity. Needs a real `bun install` (jsdom + solid-js), so the
    # test self-skips unless JAC_CLIENT_INTEGRATION is set -- we set it here and
    # run just that file in its own lean job.
    needs: changes
    # Not a required check. Skip on PRs that don't touch jac core; always run on push/dispatch.
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.core == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Run Solid jsdom runtime test
      env:
        JAC_CLIENT_INTEGRATION: "1"
      run: jac test jac/tests/runtimelib/test_solid_jsdom.jac -x

  test-client:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Set environment for testing
      run: echo "TEST_ENV=true" >> $GITHUB_ENV

    - name: Run all client tests
      # In-process sv dispatch needs jac-scale; run it in the step below.
      run: jac test jac/tests/runtimelib/client --ignore jac/tests/runtimelib/client/test_inprocess_dispatch.jac

    - name: Re-run in-process sv dispatch against jac-scale backend
      run: |
        jac install -e jac-scale
        jac test -vv jac/tests/runtimelib/client/test_inprocess_dispatch.jac

  test-packages-and-docs:
    needs: changes
    # Not a required check. Tests jac-byllm + builds/validates docs. Skip on PRs
    # that touch none of jac core, jac-byllm, docs; always run on push/dispatch.
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.core == 'true' || needs.changes.outputs.byllm == 'true' || needs.changes.outputs.docs == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Install jac-byllm (global so its tests, run from jac-byllm/, can import it)
      run: jac install -e jac-byllm --global

    - name: Set environment for testing
      run: echo "TEST_ENV=true" >> $GITHUB_ENV

    - name: Run package tests
      working-directory: jac-byllm
      run: jac test .

    - name: Install docs dependencies
      run: jac install -e docs --global

    - name: Build documentation
      working-directory: docs
      # mkdocs + its plugins install into the binary's bundled interpreter, so
      # run them through it (`jac -m`) rather than expecting a console script on
      # PATH.
      run: jac -m mkdocs build --strict

    - name: Run documentation validation tests
      working-directory: docs
      run: jac test tests/test_docs.jac

    - name: Install Playwright
      working-directory: docs
      run: |
        jac install playwright
        jac -m playwright install chromium --with-deps

    - name: Run E2E code block tests
      working-directory: docs
      # Browser rendering of the graph/error playground blocks is timing-flaky on
      # CI runners (maintainers have de-flaked this suite twice: #6528, #6756). It
      # is a non-required smoke, so retry once before failing rather than block on
      # a transient slow render. `-x` so a genuine break still fails fast.
      run: jac test tests/e2e/test_code_blocks.jac -x || jac test tests/e2e/test_code_blocks.jac -x

  test-desktop-native:
    # Jac-native desktop tests (issue #6436). Dependency-free by design: they
    # only need the jac toolchain to compile the example hosts and inspect the
    # linked artifacts (DT_NEEDED / $ORIGIN) and run handler logic through the sv
    # pathway - NO WebKitGTK, no libpython-dev, no display/Xvfb. The webview /
    # embedded-Python *runtime* behavior is covered by a separate, gated tier.
    needs: changes
    # Not a required check. Skip on PRs that touch neither jac core nor the desktop target; always run on push/dispatch.
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.core == 'true' || needs.changes.outputs.desktop == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Run dependency-free desktop tests
      run: jac test jac/tests/runtimelib/client/test_desktop_binding.jac

  test-native-macos:
    # Lean macOS-only coverage for the pure-Jac Mach-O linker changes: the
    # dylib dlopen/dlsym round-trip that guards #6821 plus the executable /
    # dylib arm64 code-signing invariants added in PR #6828.
    needs: changes
    # Not a required check. macos-latest is a premium runner; skip on PRs that
    # don't touch jac core; always run on push/dispatch to keep main covered.
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.core == 'true' }}
    runs-on: macos-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Run native Mach-O linker regression tests
      # `jac test` takes one target at a time (unlike pytest's multi-file form).
      run: |
        jac test jac/tests/compiler/passes/native/test_shared_lib.jac
        jac test jac/tests/compiler/passes/native/test_exec_link.jac

  # NOTE: the real-windows-host native job (test-native-windows) was retired in
  # the clean break to the single binary. jaclang ships only as the `jac` binary,
  # which builds for Linux and macOS (python-build-standalone has no Windows
  # target -- see build.zig osArchString / payload.zig), so there is no way to
  # run jaclang on a windows-latest runner via `pip install -e jac` anymore. The
  # PE/COFF linker logic stays covered by the cross-compiled PE tests in the
  # blocking binary gate (test_pe_linker.jac); restoring a real-Windows-loader
  # check needs a Windows binary build, tracked as a follow-up.

  test-cef-build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Build dispatch shim and subprocess binary
      working-directory: jac/jaclang/runtimelib/client/targets/desktop/native/cef
      run: jac run build.jac

    - name: Verify shared-object exports
      working-directory: jac/jaclang/runtimelib/client/targets/desktop/native/cef
      run: |
        nm -D libcef_dispatch.so | grep -q cef_dispatch_startup
        nm -D libcef_dispatch.so | grep -q cef_dispatch_execute_process
        nm -D libcef_dispatch.so | grep -q cef_platform_bootstrap

    - name: Check RPATH
      working-directory: jac/jaclang/runtimelib/client/targets/desktop/native/cef
      run: |
        # The Jac native linker emits DT_RUNPATH (readelf prints "RUNPATH"),
        # not the legacy DT_RPATH -- so match either.
        readelf -d libcef_dispatch.so | grep -qE '(RUN)?PATH.*\$ORIGIN'

    - name: ldd audit (no missing deps against libc + libcef stub)
      working-directory: jac/jaclang/runtimelib/client/targets/desktop/native/cef
      run: |
        # With libcef.so absent, ldd will report it missing -- that is expected.
        # The audit checks that no *other* unexpected dep is missing.
        # grep exits non-zero when it matches nothing (the expected/good case);
        # the trailing `|| true` keeps `set -e` from aborting the step there.
        MISSING=$(ldd libcef_dispatch.so 2>&1 | grep 'not found' | grep -v libcef || true)
        [ -z "$MISSING" ] || (echo "Unexpected missing deps: $MISSING" && exit 1)

  test-mcp:
    needs: changes
    # Not a required check. Skip on PRs that touch neither jac core nor jac-mcp; always run on push/dispatch.
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.core == 'true' || needs.changes.outputs.mcp == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Install jac-mcp (global so its tests, run from jac-mcp/, can import it)
      run: jac install -e jac-mcp --global

    - name: Run jac-mcp tests
      # cwd = plugin dir; the plugin + deps live in the binary's global site
      # (installed above), on sys.path alongside the host jaclang.
      working-directory: jac-mcp
      run: jac test .

  test-scale:
    needs: changes
    # Not a required check. Skip on PRs that touch neither jac core nor jac-scale; always run on push/dispatch.
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.core == 'true' || needs.changes.outputs.scale == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        group: [server, data, microservices, deploy, misc]
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Install jac-scale with all test extras (global, importable from jac-scale/)
      run: jac install -e jac-scale --extras test --global

    - name: Run ${{ matrix.group }} tests
      # cwd = plugin dir so jac auto-loads jac-scale/.jac/venv (its deps).
      working-directory: jac-scale
      run: |
        set +e
        failed=""
        # One process per file: the suite relies on per-file isolation.
        for f in jac_scale/tests/${{ matrix.group }}/test_*.jac; do
          echo "::group::$f"
          JAC_TEST_JOBS=0 jac test "$f" || failed="$failed $f"
          echo "::endgroup::"
        done
        if [ -n "$failed" ]; then
          echo "::error::Failed ${{ matrix.group }} test files:$failed"
          exit 1
        fi

    - name: Install jac-scale[firebase] extras
      if: matrix.group == 'data'
      run: jac install -e jac-scale --extras firebase

    - name: Run Firebase storage / Firestore / Auth SSO tests
      if: matrix.group == 'data'
      # Each file in its own process to avoid importlib double-load pollution.
      # test_firestore_e2e is omitted: needs FIRESTORE_EMULATOR_HOST.
      run: |
        jac test jac-scale/jac_scale/tests/test_gcs_storage.jac -x
        jac test jac-scale/jac_scale/tests/test_firestore_db.jac -x
        jac test jac-scale/jac_scale/tests/test_firebase_auth_sso.jac -x

  test-scale-k8s:
    needs: changes
    # Not a required check. Skips on PRs that touch neither jac core nor jac-scale,
    # or that carry the 'skip-k8s' label; always runs on push/dispatch.
    if: >-
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.core == 'true' ||
       needs.changes.outputs.scale == 'true') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-k8s')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        group: [deploy-core, failure-path]
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Install Jaseci scale package (global, importable from jac-scale/)
        run: jac install -e jac-scale --extras deploy --global

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      # MicroK8s instead of kind: its hostpath-storage provisioner binds
      # ReadWriteMany PVCs (kind's default local-path only does ReadWriteOnce),
      # which the bundle-injection path requires. Single node, so the loader and
      # app pods share the RWX bundle PVC on one host.
      - name: Set up MicroK8s (RWX-capable hostpath storage)
        run: |
          set -euxo pipefail
          sudo snap install microk8s --classic --channel=1.31/stable
          sudo microk8s status --wait-ready
          sudo microk8s enable hostpath-storage dns
          sudo microk8s kubectl -n kube-system rollout status deploy/coredns --timeout=180s
          sudo microk8s kubectl -n kube-system rollout status deploy/hostpath-provisioner --timeout=180s || true
          # Admin kubeconfig for the python kubernetes client + kubectl binary
          mkdir -p "$HOME/.kube"
          sudo microk8s config > "$HOME/.kube/config"
          sudo chown "$(id -u):$(id -g)" "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl get storageclass
          kubectl get nodes -o wide

      - name: Run K8 tests (deploy-core)
        if: matrix.group == 'deploy-core'
        working-directory: jac-scale
        env:
          JAC_TEST_JOBS: "0"
        run: |
          jac test jac_scale/tests/test_pod_env.jac -x
          jac test jac_scale/tests/test_k8s_utils.jac -x
          jac test jac_scale/tests/test_deploy_k8s.jac -x -f "not (early and exit)"

      - name: Run K8 tests (failure-path)
        if: matrix.group == 'failure-path'
        working-directory: jac-scale
        env:
          JAC_TEST_JOBS: "0"
        run: |
          jac test jac_scale/tests/test_deploy_k8s.jac -x --test_name "early exit"

  test-pypi-build:
    needs: changes
    # Not a required check, and the heaviest job (builds all wheels + jacpack
    # smoke servers). Skip on PRs that touch none of jac core, jac-scale,
    # jac-byllm; always run on push/dispatch so main stays packaging-clean.
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.core == 'true' || needs.changes.outputs.scale == 'true' || needs.changes.outputs.byllm == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: 3.12

    - name: Install build package
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Precompile all packages
      run: |
        jac run jac/jaclang/utils/precompile_bytecode.jac ./jac
        jac run jac/jaclang/utils/precompile_bytecode.jac ./jac-scale
        jac run jac/jaclang/utils/precompile_bytecode.jac ./jac-byllm

    - name: Pre-build admin dashboard UI
      run: |
        jac install -e jac-scale --extras all --global
        cd jac-scale && jac run scripts/build_admin_ui.jac

    - name: Uninstall editable packages
      run: |
        jac -m pip uninstall -y jac-scale

    - name: Clean egg-info to simulate fresh build (like publish-release)
      run: |
        rm -rf jac/jaclang.egg-info
        rm -rf jac-scale/*.egg-info jac-scale/jac_scale/*.egg-info
        rm -rf jac-byllm/*.egg-info

    - name: Build plugin wheels (jaclang itself ships as the binary, not a wheel)
      run: |
        (cd jac-scale && jac bundle)
        (cd jac-byllm && jac bundle)
        # Install the freshly built wheels INTO the binary's runtime (not system
        # Python -- jaclang is host-provided by the binary, so the plugins must
        # be importable by it). pytest ships in the binary, so no pip pytest.
        SCALE_WHL=$(ls jac-scale/dist/jac_scale-*.whl) && jac install "${SCALE_WHL}" --global
        jac install jac-byllm/dist/byllm-*.whl --global

    - name: Verify cold start with precompiled bytecode
      run: |
        jac purge
        timeout 5 jac --version

    - name: Verify bundled guides print from the built wheel
      run: bash scripts/check-guide.sh jac

    - name: Run integration tests
      run: jac run scripts/integration_tests.jac

    - name: Run tests on built packages
      run: |
        jac check jac/tests/compiler/passes/main/fixtures/checker/checker_type_ref.jac
        # Run through the binary (its bundled pytest + the host jaclang). The
        # `jac create` client flow is already covered by the blocking binary
        # gate and the jacpack smokes below, so it is not duplicated here.
        # Serial (JAC_TEST_JOBS=0): these byllm tests share a SQLite mock-LLM
        # cache that can't take xdist's parallel writers ("database is locked").
        JAC_TEST_JOBS=0 jac test jac-byllm/tests/test_byllm.jac

    # ========== jac-gpt test ==========
    - name: Create jac-gpt from jacpack
      run: |
        jac create jac-gpt --use https://raw.githubusercontent.com/jaseci-labs/jacpacks/refs/heads/main/jac-gpt/jac-gpt.jacpack
        cd jac-gpt && jac install

    - name: Install Playwright dependencies
      # --global puts it in the binary's own site so the e2e (run from jac-gpt/)
      # can import it; a plain install would land in the repo-root project venv.
      run: |
        jac install playwright --global
        jac -m playwright install chromium --with-deps

    - name: Type check jac-gpt
      working-directory: jac-gpt
      run: jac check main.jac

    - name: Restore FAISS index cache
      uses: actions/cache@v4
      with:
        path: jac-gpt/services/faiss_index
        key: jac-gpt-faiss-v1

    - name: Start jac-gpt server in background
      working-directory: jac-gpt
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        timeout 600 jac start main.jac > /tmp/jac-gpt-server.log 2>&1 &
        SERVER_PID=$!
        echo "JAC_GPT_PID=$SERVER_PID" >> $GITHUB_ENV
        echo "jac-gpt server starting with PID $SERVER_PID..."
        sleep 10
        if ! kill -0 $SERVER_PID 2>/dev/null; then
          echo "Server process died during startup"
          cat /tmp/jac-gpt-server.log
          exit 1
        fi

    - name: Wait for jac-gpt server to be ready
      run: |
        echo "Waiting for jac-gpt server on port 8000..."
        for i in $(seq 1 24); do
          if ! kill -0 ${{ env.JAC_GPT_PID }} 2>/dev/null; then
            echo "Server process exited unexpectedly"
            cat /tmp/jac-gpt-server.log
            exit 1
          fi
          if curl -sf --max-time 10 http://localhost:8000 -o /dev/null 2>&1; then
            echo "jac-gpt server is ready (attempt $i)"
            exit 0
          fi
          echo "Attempt $i/24: not ready, waiting 15s..."
          sleep 15
        done
        echo "Server failed to respond after 24 attempts"
        tail -100 /tmp/jac-gpt-server.log
        exit 1

    - name: Verify jac-gpt HTTP response
      run: |
        HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 http://localhost:8000)
        echo "jac-gpt root endpoint: HTTP $HTTP_CODE"
        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ]; then
          echo "jac-gpt server responding correctly"
        else
          echo "Unexpected HTTP $HTTP_CODE"
          exit 1
        fi

    - name: Run E2E tests
      working-directory: jac-gpt
      env:
        SERVER_URL: http://localhost:8000
      # Run from the project dir so the binary loads jac-gpt's deps; the binary
      # provides jaclang + pytest (system pytest has neither).
      run: jac test tests/test_e2e.jac -vv

    - name: Stop jac-gpt server
      if: always()
      run: |
        if [ -n "${{ env.JAC_GPT_PID }}" ]; then
          kill ${{ env.JAC_GPT_PID }} 2>/dev/null || true
          sleep 3
          kill -9 ${{ env.JAC_GPT_PID }} 2>/dev/null || true
        fi

    # ========== Algo test ==========
    - name: Create Algo from jacpack
      run: |
        jac create algo --use https://raw.githubusercontent.com/jaseci-labs/jacpacks/refs/heads/main/Algo/Algo.jacpack
        cd algo && jac install

    - name: Type check Algo
      working-directory: algo
      run: jac check main.jac

    - name: Start Algo server in background
      working-directory: algo
      run: |
        timeout 600 jac start main.jac > /tmp/algo-server.log 2>&1 &
        ALGO_PID=$!
        echo "ALGO_PID=$ALGO_PID" >> $GITHUB_ENV
        echo "Algo server starting with PID $ALGO_PID..."
        sleep 10
        if ! kill -0 $ALGO_PID 2>/dev/null; then
          echo "Server process died during startup"
          cat /tmp/algo-server.log
          exit 1
        fi

    - name: Wait for Algo server to be ready
      run: |
        echo "Waiting for Algo server on port 8000..."
        for i in $(seq 1 24); do
          if ! kill -0 ${{ env.ALGO_PID }} 2>/dev/null; then
            echo "Server process exited unexpectedly"
            cat /tmp/algo-server.log
            exit 1
          fi
          if curl -sf --max-time 10 http://localhost:8000 -o /dev/null 2>&1; then
            echo "Algo server is ready (attempt $i)"
            exit 0
          fi
          echo "Attempt $i/24: not ready, waiting 15s..."
          sleep 15
        done
        echo "Server failed to respond after 24 attempts"
        tail -100 /tmp/algo-server.log
        exit 1

    - name: Verify Algo HTTP response
      run: |
        HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 http://localhost:8000)
        echo "Algo root endpoint: HTTP $HTTP_CODE"
        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ]; then
          echo "Algo server responding correctly"
        else
          echo "Unexpected HTTP $HTTP_CODE"
          exit 1
        fi

    - name: Stop Algo server
      if: always()
      run: |
        if [ -n "${{ env.ALGO_PID }}" ]; then
          kill ${{ env.ALGO_PID }} 2>/dev/null || true
          sleep 3
          kill -9 ${{ env.ALGO_PID }} 2>/dev/null || true
        fi

    # ========== fullstack eject smoke ==========
    # End-to-end: the ejected FastAPI backend (jaclang + fastapi + uvicorn) must
    # install and serve HTTP. Codegen unit tests live in test_eject.jac.
    - name: Create fullstack project and eject it
      run: |
        jac create --use fullstack fs-smoke
        jac eject fs-smoke

    - name: Install ejected backend and start it
      working-directory: fs-smoke/ejected/backend
      run: |
        pip install -r requirements.txt
        PORT=8000 timeout 600 python main.py > /tmp/fullstack-ejected.log 2>&1 &
        EJECTED_PID=$!
        echo "EJECTED_PID=$EJECTED_PID" >> $GITHUB_ENV
        sleep 5
        if ! kill -0 $EJECTED_PID 2>/dev/null; then
          echo "Ejected backend died during startup"
          cat /tmp/fullstack-ejected.log
          exit 1
        fi

    - name: Verify ejected fullstack backend responds
      run: |
        for i in $(seq 1 12); do
          if ! kill -0 ${{ env.EJECTED_PID }} 2>/dev/null; then
            echo "Ejected backend exited unexpectedly"
            tail -100 /tmp/fullstack-ejected.log
            exit 1
          fi
          if curl -sf --max-time 5 http://localhost:8000/__health -o /dev/null 2>&1; then
            echo "Ejected backend responding (attempt $i)"
            exit 0
          fi
          sleep 5
        done
        echo "Ejected backend failed to respond"
        tail -100 /tmp/fullstack-ejected.log
        exit 1

    - name: Stop ejected fullstack server
      if: always()
      run: |
        if [ -n "${{ env.EJECTED_PID }}" ]; then
          kill ${{ env.EJECTED_PID }} 2>/dev/null || true
          sleep 3
          kill -9 ${{ env.EJECTED_PID }} 2>/dev/null || true
        fi

    - name: Upload jac-gpt server logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jac-gpt-test-logs
        path: /tmp/jac-gpt-server.log
        retention-days: 7

    - name: Upload Algo server logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: algo-test-logs
        path: /tmp/algo-server.log
        retention-days: 7

    - name: Upload fullstack ejected backend logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fullstack-ejected-logs
        path: /tmp/fullstack-ejected.log
        retention-days: 7

    - name: Jac pack test summary
      if: always()
      run: |
        echo "## Jac Pack Smoke Tests" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| jac-gpt | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| algo | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| fullstack (ejected) | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
