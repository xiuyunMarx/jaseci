[project]
name = "jac-scale"
version = "0.2.31"
description = "Plugin for Jac enabling fully abstracted and automated deployment and scaling with FastAPI, Redis, MongoDB, and Kubernetes integration."
authors = [{ name = "Jason Mars", email = "jason@mars.ninja" }]
maintainers = [{ name = "Jason Mars", email = "jason@mars.ninja" }]
license = "MIT"
readme = "README.md"
requires-python = ">=3.12"

[project.urls]
repository = "https://github.com/jaseci-labs/jaseci"
homepage = "https://jaseci.org"
documentation = "https://jac-lang.org"
source = "https://github.com/jaseci-labs/jaseci/tree/main/jac-scale"
issues = "https://github.com/jaseci-labs/jaseci/issues"
changelog = "https://github.com/jaseci-labs/jaseci/blob/main/docs/docs/community/release_notes/jac-scale.md"

[project.include]
packages = ["jac_scale*"]

[project.include.data]
jac_scale = [
   "templates/**/*.html",
   "deploy/**/*.template",
   "admin/_dist/*",
   "admin/_dist/**/*",
]

[dependencies]
rich = ">=13.0.0"
# jaclang is provided by the jac binary at runtime (host dependency), not
# pulled from PyPI -- it is no longer published there.
python-dotenv = ">=1.2.1,<2.0.0"
fastapi = ">=0.121.3,<0.122.0"
"uvicorn[standard]" = ">=0.38.0,<0.39.0"
pyjwt = ">=2.10.1,<2.11.0"
fastapi-sso = ">=0.21.0,<1.0.0"
python-multipart = ">=0.0.21,<1.0.0"
bcrypt = ">=4.0.0,<5.0.0"
aiohttp = ">=3.9.0,<4.0.0"
sqlalchemy = ">=2.0.0,<3.0.0"
email-validator = ">=2.3.0,<3.0.0"

[optional-dependencies.data]
pymongo = ">=4.15.4,<5.0.0"
redis = ">=7.1.0,<8.0.0"

[optional-dependencies.monitoring]
prometheus-client = ">=0.21.0,<1.0.0"

[optional-dependencies.firebase]
google-cloud-firestore = ">=2.21.0,<3.0.0"
google-cloud-storage = ">=2.19.0,<3.0.0"
firebase-admin = ">=6.0.0,<8.0.0"

# O-02 distributed tracing. App-side OpenTelemetry SDK + OTLP/HTTP
# exporter to the Alloy collector (M-14.a DaemonSet doubles as an OTel
# collector) -> Tempo. Soft dependency: jac-scale runs without it, just
# without spans (see jac_scale/_optdeps/opentelemetry.jac).
[optional-dependencies.tracing]
opentelemetry-sdk = ">=1.27.0,<2.0.0"
opentelemetry-exporter-otlp-proto-http = ">=1.27.0,<2.0.0"

[optional-dependencies.scheduler]
apscheduler = ">=3.11.2,<4.0.0"

[optional-dependencies.deploy]
kubernetes = ">=34.1.0,<35.0.0"
docker = ">=7.1.0,<8.0.0"
# K-track P0.8 auto-deploys MongoDB + Redis as StatefulSets and
# injects MONGODB_URI / REDIS_URL into every service pod. Without
# the matching client libraries on the pod side, services crash
# at startup when Jac.get_user_manager() tries to open the Mongo
# connection. `deploy` mode genuinely needs the data clients, so
# bundle them rather than make every user remember `[deploy,data]`.
"jac-scale[data]" = "*"

[optional-dependencies.aws]
boto3 = ">=1.40.0"

[optional-dependencies.all]
"jac-scale[data,monitoring,tracing,scheduler,deploy,aws,firebase]" = "*"

[optional-dependencies.test]
"jac-scale[all]" = "*"
"testcontainers[mongodb,redis]" = "*"
requests = "*"
"moto[s3]" = ">=5.0.0"

[entrypoints.jac]
scale = "jac_scale.plugin:JacCmd"
scale_plugin_config = "jac_scale.config.plugin_config:JacScalePluginConfig"
