[project]
name = "emailer-sendgrid-example"
version = "1.0.0"
description = "Custom SendGrid emailer example for jac-scale"
entry-point = "app.jac"

# Custom provider: factory imports emailer:SendGridEmailer at startup.
# The class must subclass jac_scale.emailer.emailer.Emailer.
[plugins.scale.emailer]
provider = "emailer:SendGridEmailer"
from_address = "no-reply@example.com"
# API key is read from SENDGRID_API_KEY env var inside the class.

# Token TTLs + frontend URLs the framework drops into the email body.
[plugins.scale.auth]
verify_token_ttl_seconds = 86400
reset_token_ttl_seconds = 1800
verify_url_template = "https://app.example.com/verify?token={token}"
reset_url_template = "https://app.example.com/reset?token={token}"
