[project]
name = "little-x"
version = "1.0.0"
description = "Little X - A Twitter-like social app built with Jac"
entry-point = "main.jac"

[jacpack]
name = "little-x"
description = "Little X social app template"

[jac-shadcn]
style = "nova"
baseColor = "zinc"
theme = "orange"
font = "figtree"
radius = "large"
menuAccent = "subtle"
menuColor = "default"
[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[dependencies]
numpy = ">=1.24.0"
scikit-learn = ">=1.3.0"

[dependencies.npm]
"@fontsource-variable/figtree" = "*"
"@tailwindcss/vite" = "^4.1.17"
tailwindcss = "^4.1.17"
shadcn = "^3.8.5"
clsx = "^2.1.1"
tailwind-merge = "^3.5.0"
tw-animate-css = "^1.4.0"
radix-ui = "*"
class-variance-authority = "*"
"@hugeicons/react" = "*"
"@hugeicons/core-free-icons" = "*"
lucide-react = "^0.469.0"
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
zod = "^4.3.6"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client.app_meta_data]
title = "Little-X"
description = "A decentralized social platform built with Jac"
keywords = "little-x social jac jaseci"
author = "Jaseci Labs"
theme_color = "#f97316"
icon = "/static/assets/littlex-logo.svg"

# Experimental-mode deploy source. With `jac start --scale --experimental`, the
# pod git-clones this repo/branch and `zig build`s jac from source in-cluster
# (bypassing install.sh / GitHub Releases). Points at the fork's branch so the
# in-pod build uses the rearchitecture code.
[plugins.scale.kubernetes]
jaseci_repo_url = "https://github.com/MusabMahmoodh/jaseci.git"
jaseci_branch = "feat/jac-scale-rearchitecture"
