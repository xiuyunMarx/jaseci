# jaclang project manifest. The single binary is built from this source tree;
# the build reads version/metadata here (not from a Python pyproject backend).
[project]
name = "jaclang"
version = "0.30.5"
description = "Jac programming language - Python-like syntax, compiles to Python bytecode, JavaScript, and native machine code with novel constructs for AI-integrated programming."
license = "MIT"
readme = "README.md"
requires_python = ">=3.14"
# No runtime PyPI deps: native LLVM is the in-tree LLVMPY_* shim, statically
# linked by Zig (jac/native + `zig build fetch-llvm`), not the llvmlite wheel.
dependencies = []

[project.urls]
Repository = "https://github.com/jaseci-labs/jaseci"
Homepage = "https://jaseci.org"
Documentation = "https://docs.jaseci.org"

# Editable dev loop: reroute `import jaclang` to this in-repo source so the `jac`
# binary runs your latest edits with no rebuild. Config resolves to the nearest
# jac.toml, so this mirrors the root jac.toml's stanza to keep the loop active
# when running from this dir (e.g. `cd jac && jac test tests`). `"."` is this
# dir, which contains `jaclang/`. Set JAC_NO_DEV_SOURCE=1 to force it off.
[dev]
jaclang_source = "."

# `jac test` discovers the suite here (mirrors pytest's testpaths).
[test]
directory = "tests"

# Mirrors the root jac.toml's [precommit] and [check.lint] verbatim. Config
# resolves to the NEAREST jac.toml (no inheritance from ancestors today), so
# without these blocks `jac format --lintfix` / `jac precommit` run from inside
# `jac/` would silently skip the opt-in deslop rules (W3050/W3051), the
# excludes, and the precommit typecheck gate. Keep in sync with the root until
# config resolution gains ancestor inheritance, after which these duplicates
# can be removed.
[precommit]
typecheck = false

[check.lint]
select = ["all", "strip-comments", "strip-docstrings"]
exclude = [
    "docs/*",
    "*/examples/*",
    "*/tests/*",
    # Folded-in scale subsystem: large self-contained subsystem whose inline
    # comments (k8s/deploy/observability logic) are kept, not deslopped. This is
    # the config that governs jac/jaclang/scale/** (nearest jac.toml wins).
    "*/scale/*",
    # Folded-in byllm subsystem (the `by llm()` feature): same rationale as scale
    # -- a large self-contained subsystem whose inline comments are kept.
    "*/byllm/*",
    "console.impl.jac",
    "cli_boot.jac",
    # Files whose comments/docstrings are load-bearing, so they are NOT deslopped:
    #  - jir_registry.jac is generated (jac gen-jir-registry) and must match its
    #    commented output;
    #  - plugin_bridge.na.jac carries functional `# --- BRIDGE ... ---` markers the
    #    native bridge extractor reads.
    "jir_registry.jac",
    "plugin_bridge.na.jac",
]
