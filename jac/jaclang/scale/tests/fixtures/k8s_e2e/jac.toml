[project]
name = "jac-shop"
version = "0.1.0"
description = "A small e-commerce app built as microservices"
entry-point = "main.jac"

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
zod = "^4.3.6"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]

# NO [plugins.scale.*] config - deliberately: the zero-config example (#7137/#7140/#7144).
# Services/routes/database/client entry are all auto-derived; the e2e harness
# appends its test-only opt-ins (ingress/logs/cors) at run time.
