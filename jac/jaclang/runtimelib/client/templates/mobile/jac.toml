[project]
name = "{{name}}"
version = "1.0.0"
description = "Jac client application: {{name}}"
entry-point = "main.jac"
kind = "mobile"

[dependencies]

[dependencies.npm]
jac-client-node = "1.0.7"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "1.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]

[jacpack]
name = "mobile"
description = "Jac mobile client app (Capacitor + Vite)"
jaclang = "0.9.8"

[jacpack.options]
directories = ["components", "assets", ".jac/client"]
post_create_hook = "jaclang.runtimelib.client.plugin_config:_post_create_client"
